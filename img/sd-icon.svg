<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD60A"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
  </defs>
  <!-- 8 rays rotated around center -->
  <rect x="47" y="5" width="6" height="17" rx="3" fill="url(#sg)"/>
  <rect x="47" y="5" width="6" height="17" rx="3" fill="url(#sg)" transform="rotate(45 50 50)"/>
  <rect x="47" y="5" width="6" height="17" rx="3" fill="url(#sg)" transform="rotate(90 50 50)"/>
  <rect x="47" y="5" width="6" height="17" rx="3" fill="url(#sg)" transform="rotate(135 50 50)"/>
  <rect x="47" y="5" width="6" height="17" rx="3" fill="url(#sg)" transform="rotate(180 50 50)"/>
  <rect x="47" y="5" width="6" height="17" rx="3" fill="url(#sg)" transform="rotate(225 50 50)"/>
  <rect x="47" y="5" width="6" height="17" rx="3" fill="url(#sg)" transform="rotate(270 50 50)"/>
  <rect x="47" y="5" width="6" height="17" rx="3" fill="url(#sg)" transform="rotate(315 50 50)"/>
  <!-- Sun core -->
  <circle cx="50" cy="50" r="22" fill="url(#sg)"/>
  <!-- Highlight -->
  <circle cx="43" cy="43" r="7" fill="white" opacity="0.18"/>
</svg>
